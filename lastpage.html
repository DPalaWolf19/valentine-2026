<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/flower.css" />
    <style>
      /* Estilos adicionales para centrar el video y separar el flower */
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh; /* Asegura que el body ocupe al menos toda la altura de la ventana */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; /* Alinea el contenido en la parte superior */
      }

      video {
        display: block;
        margin: 20px auto; /* Añade margen superior e inferior para separar del texto y la flor */
        max-width: 100%; /* Asegura que el video no sea más ancho que su contenedor */
      }

      .flower {
        margin-top: 20px; /* Añade un margen superior para separar el flower del video */
        margin-bottom: 40px; /* Añade un margen inferior para asegurar que la flor se vea completa */
      }

      #thankyou {
        text-align: center; /* Centra el texto de agradecimiento */
        margin-top: 20px; /* Añade un margen superior para separar del borde de la página */
      }
    </style>
  </head>
  <body>
    <div id="thankyou"><b>Muchas gracias por ser mi novia, preciosa (っ˘з(˘⌣˘ )</b></div>

    <video controls>
      <source src="bailando.mp4" type="video/mp4">
      Tu navegador no soporta el video adjunto.
    </video>

    <div class="flower">
      <div class="f-wrapper">
        <div class="flower__line"></div>
        <div class="f">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__leaf flower__leaf--5"></div>
          <div class="flower__leaf flower__leaf--6"></div>
          <div class="flower__leaf flower__leaf--7"></div>
          <div
            class="flower__leaf flower__leaf--8 flower__fall-down--yellow"
          ></div>
        </div>
      </div>

      <div class="f-wrapper f-wrapper--2">
        <div class="flower__line"></div>
        <div class="f">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__leaf flower__leaf--5"></div>
          <div class="flower__leaf flower__leaf--6"></div>
          <div class="flower__leaf flower__leaf--7"></div>
          <div
            class="flower__leaf flower__leaf--8 flower__fall-down--pink"
          ></div>
        </div>
      </div>

      <div class="f-wrapper f-wrapper--3">
        <div class="flower__line"></div>
        <div class="f">
          <div class="flower__leaf flower__leaf--1"></div>
          <div class="flower__leaf flower__leaf--2"></div>
          <div class="flower__leaf flower__leaf--3"></div>
          <div class="flower__leaf flower__leaf--4"></div>
          <div class="flower__leaf flower__leaf--5"></div>
          <div class="flower__leaf flower__leaf--6"></div>
          <div class="flower__leaf flower__leaf--7"></div>
          <div
            class="flower__leaf flower__leaf--8 flower__fall-down--purple"
          ></div>
        </div>
      </div>
      <div class="flower__glass"></div>
    </div>
  </body>
</html>
